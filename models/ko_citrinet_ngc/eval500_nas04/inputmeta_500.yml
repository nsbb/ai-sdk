# IMAGE_NV12, IMAGE_YUV444, IMAGE_GRAY, IMAGE_BGRA, TENSOR"
input_meta:
  databases:
  - path: /nas02/geonhui83/stt/new_citirinet/ko_citrinet_ngc/eval500_nas04/dataset_500.txt
    type: TEXT
    ports:
    - lid: audio_signal_480
      category: undefined
